name: Build Android APK Auto-Detect

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project
      run: unzip -q *.zip

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Smart Build with Gradle
      run: |
        # البحث عن مسار الملف تلقائياً
        GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
        
        if [ -z "$GRADLE_PATH" ]; then
          echo "Error: gradlew not found! Your ZIP is missing the Gradle wrapper files."
          exit 1
        fi
        
        # الدخول للمسار الصحيح وبناء التطبيق
        cd $(dirname "$GRADLE_PATH")
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: quran-player-apk
        path: '**/*.apk'
