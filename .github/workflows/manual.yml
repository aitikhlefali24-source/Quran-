name: Build Android APK from ZIP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project
      run: unzip QuranAutoPlayerProject.zip

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        cd QuranAutoPlayerProject
        chmod +x gradlew

    - name: Build with Gradle
      run: |
        cd QuranAutoPlayerProject
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: QuranAutoPlayerProject/app/build/outputs/apk/debug/app-debug.apk
